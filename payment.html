<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Processing Payment · Nandi Garments</title>
    <link rel="icon" type="image/png" href="nandi-logo.png">
  <link rel="apple-touch-icon" href="nandi-logo.png">
<link rel="stylesheet" href="styles.css">
  <style>
    .processing-hero{padding:3rem 1rem;text-align:center}
    .spinner{width:72px;height:72px;border-radius:50%;border:8px solid #f1f3f5;border-top-color:var(--accent);margin:0 auto;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .panel{background:var(--surface);border:1px solid #eef2f6;border-radius:10px;padding:1rem;max-width:560px;margin:1rem auto}
    .muted{color:var(--muted)}
    .order-line{display:flex;justify-content:space-between;margin:.5rem 0}
    .btn{display:inline-block;padding:.5rem .75rem;border-radius:8px;border:1px solid #e6eef6;background:#fff}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="logo-container">
        <img src="nandi-logo.png" alt="Nandi Garments logo" class="header-logo">
        <h1>Nandi Garments</h1>
      </div>
    </div>
  </header>

  <main>
    <section class="processing-hero">
      <div class="spinner" aria-hidden="true"></div>
      <h2>Processing Payment</h2>
      <p class="muted">Please wait — we are completing your payment.</p>
    </section>

    <div class="panel" id="order-panel">
      <h3 style="margin-top:0">Order</h3>
      <div class="order-line"><span>Order ID</span><strong id="order-id">—</strong></div>
      <div class="order-line"><span>Method</span><span id="order-method">—</span></div>
      <div class="order-line"><span>Amount</span><strong id="order-amount">—</strong></div>
      <div style="margin-top:.75rem;text-align:center">
        <button id="force-success" class="btn">Force Success</button>
        <button id="force-failure" class="btn">Force Failure</button>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 Nandi Garments</div>
  </footer>

  <script>
    const CART_KEY = 'ng_cart_v1';
    const LAST_ORDER_KEY = 'ng_last_order_v1';
    const LAST_COUPON_KEY = 'ng_last_coupon_v1';

    function safeParse(json, fallback){ try{ return JSON.parse(json); }catch(e){ return fallback; } }
    function money(n){ const x = Number(n || 0); return '₹' + x.toLocaleString('en-IN'); }

    function pickOrderFromContext(){
      const params = new URLSearchParams(location.search);
      const qOrderId = params.get('orderId');
      const qMethod = params.get('method');
      const qAmount = params.get('amount');
      const stored = safeParse(localStorage.getItem(LAST_ORDER_KEY), null);
      if(stored && (!qOrderId || stored.orderId === qOrderId)) return stored;
      // fallback: build a minimal order
      return {
        orderId: qOrderId || ('NG' + Date.now()),
        totals: { total: qAmount ? Number(qAmount) : 0 },
        payment: { method: qMethod || 'simulator', status: 'processing' }
      };
    }

    function updateUI(order){
      document.getElementById('order-id').textContent = order.orderId || '—';
      document.getElementById('order-method').textContent = (order.payment && order.payment.method) || '—';
      document.getElementById('order-amount').textContent = money(order.totals && order.totals.total);
    }

    function finalizeAndRedirect(order, ok){
      order.payment = order.payment || {};
      order.payment.provider = 'simulator';
      order.payment.status = ok ? 'success' : 'failed';
      order.payment.paymentId = 'SIM' + Math.floor(Math.random()*900000+100000);
      localStorage.setItem(LAST_ORDER_KEY, JSON.stringify(order));
      if(ok){
        localStorage.removeItem(CART_KEY);
        localStorage.removeItem(LAST_COUPON_KEY);
        setTimeout(()=>{
          window.location.href = `payment-success.html?status=paid&orderId=${encodeURIComponent(order.orderId)}`;
        }, 600);
      } else {
        setTimeout(()=>{
          window.location.href = `payment-failure.html?orderId=${encodeURIComponent(order.orderId)}`;
        }, 600);
      }
    }

    document.addEventListener('DOMContentLoaded', ()=>{
      const order = pickOrderFromContext();
      updateUI(order);

      const params = new URLSearchParams(location.search);
      const force = params.get('force');

      // allow quick test buttons
      document.getElementById('force-success').addEventListener('click', ()=> finalizeAndRedirect(order, true));
      document.getElementById('force-failure').addEventListener('click', ()=> finalizeAndRedirect(order, false));

      // auto-complete after short delay
      setTimeout(()=>{
        if(force === 'success') return finalizeAndRedirect(order, true);
        if(force === 'failure') return finalizeAndRedirect(order, false);
        finalizeAndRedirect(order, true);
      }, 2200);
    });
  </script>
</body>
</html>
